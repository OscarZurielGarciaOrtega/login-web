<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
</head>
<body class="d-flex align-items-center bg-light">
    
    <main class="form-signin w-100 m-auto">
        <div class="card shadow-sm p-4 border-0">
            <div class="text-center mb-4">
                <img src="img/acceso.png" alt="Logo" width="72" height="72" class="mb-3 rounded-circle bg-secondary">
                <h1 class="h4 mb-3 fw-normal">Iniciar Sesión</h1>
            </div>

            
            <form id="loginForm" novalidate>
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="emailInput" placeholder="correo@ejemplo.com">
                    <label for="emailInput">Correo Electrónico</label>
                    <div class="invalid-feedback text-start">
                        Debes ingresar un correo válido.
                    </div>
                </div>
                <div class="form-floating mb-4">
                    <input type="password" class="form-control" id="passwordInput" placeholder="Contraseña">
                    <label for="passwordInput">Contraseña</label>
                    <div class="invalid-feedback text-start">
                        La contraseña no puede estar vacía.
                    </div>
                </div>
                
                <button class="w-100 btn btn-lg btn-dark" type="submit">Ingresar al Sistema</button>
            </form>
        </div>
    </main>

    
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/login.js"></script>
</body>
</html>
