<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema - Panel principal</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
  />


  <link href="css/login.css" rel="stylesheet" />
  <link href="css/modal.css" rel="stylesheet" />
</head>
<body>


  <nav class="navbar navbar-dark bg-dark px-3 fixed-top">

    <button id="btnHamburguesa" class="btn btn-outline-light" type="button">
      <i class="bi bi-list fs-4"></i>
    </button>

    <span class="navbar-brand mb-0 h1 ms-2">Sistema</span>


    <div class="ms-auto dropdown">
      <button
        class="btn btn-dark dropdown-toggle d-flex align-items-center"
        type="button"
        id="dropdownUsuario"
        data-bs-toggle="dropdown"
        aria-expanded="false"
      >
        <i class="bi bi-person-circle fs-5 me-2"></i>

        <span id="nombreUsuarioNavbar">Usuario</span>
      </button>
      <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="dropdownUsuario">
        <li><a class="dropdown-item" href="#">Mi perfil</a></li>
        <li><hr class="dropdown-divider" /></li>
        <li>
          <a class="dropdown-item text-danger" href="#" id="btnSalir">
            <i class="bi bi-box-arrow-right me-1"></i> Salir del sistema
          </a>
        </li>
      </ul>
    </div>
  </nav>


  <aside id="sidebar" class="sidebar bg-light border-end">
    <ul class="nav flex-column py-3">

      <li class="nav-item">
        <a href="#" class="nav-link"><i class="bi bi-house-door me-2"></i>Inicio</a>
      </li>


      <li class="nav-item">
        <button id="btnMenuUsuarios" class="nav-link btn btn-link text-start w-100 d-flex justify-content-between align-items-center">
          <span><i class="bi bi-people me-2"></i>Usuarios</span>
          <i class="bi bi-chevron-down"></i>
        </button>

        <ul id="submenuUsuarios" class="submenu list-unstyled ps-4">
          <li>
            <a href="#" id="linkCaptura" class="nav-link">
              <i class="bi bi-pencil-square me-2"></i>Captura
            </a>
          </li>
        </ul>
      </li>

      <li class="nav-item">
        <a href="#" id="linkAlumnos" class="nav-link">
          <i class="bi bi-mortarboard me-2"></i>Alumnos
        </a>
      </li>

    </ul>
  </aside>


  <main id="contenidoPrincipal" class="contenido-principal p-4">


    <section id="seccionCaptura">
      <h2 class="h4 mb-3">Captura de usuario</h2>

      <form id="formCaptura" class="col-12 col-md-6" novalidate>
        <div class="mb-3">
          <label for="capturaNombre" class="form-label">Nombre de usuario</label>
          <input type="text" class="form-control" id="capturaNombre" />
        </div>

        <div class="mb-3">
          <label for="capturaCorreo" class="form-label">Correo electrónico</label>
          <input type="text" class="form-control" id="capturaCorreo" />
        </div>

        <div class="mb-3">
          <label for="capturaPassword" class="form-label">Contraseña</label>
          <input type="password" class="form-control" id="capturaPassword" />
        </div>

        <div id="mensajeCaptura" class="small mb-3"></div>

        <button type="submit" class="btn btn-primary">Guardar usuario</button>
      </form>
    </section>


    <section id="seccionAlumnos" class="d-none">
      <h2 class="h4 mb-3">Registro de alumno</h2>

      <form id="formAlumno" class="col-12 col-md-6" novalidate>
        <div class="mb-3">
          <label for="alumnoNombre" class="form-label">Nombre del alumno</label>
          <input type="text" class="form-control" id="alumnoNombre" />
        </div>

        <div class="mb-3">
          <label for="alumnoNumeroControl" class="form-label">Número de control</label>
          <input
            type="text"
            class="form-control"
            id="alumnoNumeroControl"
            maxlength="6"
            placeholder="Ej. 210123 (6 dígitos)"
          />
        </div>

        <div class="mb-3">
          <label for="alumnoEdad" class="form-label">Edad</label>
          <input type="number" min="0" class="form-control" id="alumnoEdad" />
        </div>

        <div id="mensajeAlumno" class="small mb-3"></div>

        <button type="submit" class="btn btn-primary">Validar</button>
      </form>
    </section>

  </main>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script src="js/Modal.js"></script>

  <script src="js/utileria.js"></script>

  <script src="js/index_5.js"></script>

</body>
</html>
